<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prevención de Riesgos Laborales</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0f172a;
            --accent-blue: #3b82f6;
            --light-blue: #60a5fa;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-blue);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
        }

        /* Menú Lateral Fijo */
        nav {
            width: 260px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem 1rem;
            backdrop-filter: blur(10px);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        nav h1 {
            font-size: 1.1rem;
            color: var(--light-blue);
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
            margin-bottom: 2rem;
        }

        nav ul { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        
        .nav-category {
            display: block;
            margin: 20px 0 10px 10px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #64748b;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-radius: 8px;
            transition: 0.3s;
            margin-bottom: 5px;
        }

        nav a:hover, nav a.active {
            background: var(--accent-blue);
            color: white;
        }

        /* Referencias al fondo del menú */
        .nav-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        /* Contenedor Principal */
        main {
            margin-left: 260px; /* IMPORTANTE: Deja espacio para el menú fijo */
            padding: 3rem;
            width: 100%;
            max-width: 1200px;
        }

        /* Estilos de las tarjetas (Index) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            position: relative;
            transition: 0.4s;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--accent-blue); }
        .badge { position: absolute; top: 15px; right: 15px; background: var(--accent-blue); padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; }
        
        /* Sección Referencias */
        #referencias {
            margin-top: 60px;
            background: rgba(255, 255, 255, 0.02);
            padding: 2rem;
            border-radius: 15px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <nav>
        <h1>Salud & IT</h1>
        <ul>
            <li><a href="#" class="active"><i class="fas fa-home"></i> &nbsp; Inicio</a></li>
            
            <span class="nav-category">1. RIESGOS</span>
            <li><a href="#"><i class="fas fa-bone"></i> &nbsp; T. Físicos</a></li>
            <li><a href="#"><i class="fas fa-eye"></i> &nbsp; Fatiga Visual</a></li>
            <li><a href="#"><i class="fas fa-brain"></i> &nbsp; Carga Mental</a></li>
            
            <span class="nav-category">2. PREVENCIÓN</span>
            <li><a href="#"><i class="fas fa-chair"></i> &nbsp; Diseño Puesto</a></li>
            <li><a href="#"><i class="fas fa-walking"></i> &nbsp; Pausas</a></li>
            <li><a href="#"><i class="fas fa-wind"></i> &nbsp; Higiene</a></li>
        </ul>

        <div class="nav-footer">
            <a href="#referencias"><i class="fas fa-book"></i> &nbsp; Referencias</a>
        </div>
    </nav>

    <main>
        </main>

</body>
</html>
