<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/css/estilos.css">
    
    <style>
      /* --- CONTENEDOR PRINCIPAL --- */
      .main-container-layout {
        display: flex;
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      /* --- BARRA LATERAL (SIDEBAR) --- */
      .sidebar {
        width: 250px;
        background-color: #1a1c2c;
        color: white;
        padding: 20px;
        position: fixed;
        height: 100%;
      }

      .sidebar h2 {
        font-size: 1.2em;
        border-bottom: 1px solid #34495e;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }

      .sidebar nav a {
        display: block;
        color: #adb5bd;
        text-decoration: none;
        padding: 10px;
        margin-bottom: 5px;
        border-radius: 5px;
        transition: 0.3s;
      }

      .sidebar nav a:hover {
        background: #2d3142;
        color: white;
      }

      /* --- AREA DE CONTENIDO --- */
      .content-area {
        margin-left: 270px; /* Deja espacio para la sidebar */
        padding: 40px;
        width: 100%;
        background-color: #f4f4f4;
      }
    </style>
</head>
<body>

    <div class="main-container-layout">
        
        <aside class="sidebar">
            <h2>SEGURIDAD LABORAL</h2>
            <nav>
                <a href="{{ site.baseurl }}/index.html">🏠 Inicio</a>
                
                <a href="{{ site.baseurl }}/marco_legal.html">⚖️ Marco Legal</a>
                <a href="{{ site.baseurl }}/riesgos.html">⚠️ Riesgos</a>
                <a href="{{ site.baseurl }}/epis.html">⛑️ Equipos (EPI)</a>
                <a href="{{ site.baseurl }}/referencias.html">📚 Referencias</a>
            </nav>
        </aside>

        <main class="content-area">
            {{ content }}
        </main>

    </div>

</body>
</html>
